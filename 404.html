<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    background: #0a0a0b;
    color: #ededee;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    z-index: -1;
  }
  body::after{
    content:"";
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(193,18,31,0.12), transparent 60%);
    pointer-events: none;
    z-index: -1;
  }
  .wrap{ max-width: 600px; }
  .logo{
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid #26262b;
    box-shadow: 0 0 0 2px #0a0a0b, 0 0 60px rgba(193,18,31,0.3);
    margin-bottom: 36px;
  }
  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: #c1121f;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  h1{
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 200px);
    line-height: 0.85;
    letter-spacing: 0.005em;
    margin-bottom: 20px;
  }
  h1 .red{ color: #c1121f; }
  h2{
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 44px);
    letter-spacing: 0.03em;
    line-height: 1.05;
    margin-bottom: 18px;
  }
  p{
    font-size: 16px;
    color: #9a9a9f;
    line-height: 1.6;
    margin-bottom: 36px;
  }
  a.cta{
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 14px 28px;
    background: #c1121f;
    color: #fff;
    text-decoration: none;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    border: 1px solid #c1121f;
    transition: all 0.2s;
  }
  a.cta:hover{
    background: transparent;
    color: #c1121f;
    box-shadow: 0 0 30px rgba(193,18,31,0.35);
  }
  .divider{
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin: 24px 0;
  }
  .divider::before, .divider::after{
    content:""; flex: 1; height: 1px; max-width: 100px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.35), transparent);
  }
  .divider .star{
    font-family: 'Bebas Neue', sans-serif;
    color: #d4af37;
    font-size: 18px;
    letter-spacing: 0.4em;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="assets/oplo-logo.png" alt="OPLO" class="logo">
    <div class="eyebrow">// SIGNAL LOST</div>
    <h1>4<span class="red">0</span>4</h1>
    <div class="divider"><span class="star">★</span></div>
    <h2>This Page Is Off The Range.</h2>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back on target.</p>
    <a href="/" class="cta">Return to OPLO.GOLD →</a>
  </div>
</body>
</html>
